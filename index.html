<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>Auto Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        img {
            width: 90%;
            max-width: 800px;
            animation: zoomIn 2s ease forwards;
            border-radius: 12px;
        }
        @keyframes zoomIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
        <img src="images/uwu.png" alt="Redirect Image">
    </a>

    <script>
        setTimeout(function() {
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }, 2000);
    </script>

</body>
</html>
